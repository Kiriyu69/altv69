<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">

<title>Alpha Stream</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>

<style>
html,
body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

#video-container{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  background:#000;
}

video{
  width:100%;
  height:100%;
}

.brand{
  position:absolute;
  top:12px;
  left:16px;
  z-index:999;
  padding:6px 12px;
  border-radius:8px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(5px);
  color:#fff;
  font-size:14px;
  font-weight:600;
  pointer-events:none;
}

.status{
  position:absolute;
  right:16px;
  top:12px;
  z-index:999;
  padding:6px 12px;
  border-radius:8px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(5px);
  color:#00ff88;
  font-size:13px;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="video-container" data-shaka-player-container>

  <div class="brand">
    ALPHA STREAM
  </div>

  <div class="status" id="status">
    Loading...
  </div>

  <video
    id="video"
    data-shaka-player
    autoplay
    playsinline>
  </video>

</div>

<script src="vx-orion-core.js"></script>

</body>
</html>
